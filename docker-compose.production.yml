services:
  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/orontes.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      - public
      - internal
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_ORIGIN: ${APP_ORIGIN:?APP_ORIGIN is required}
      TRUST_PROXY: "true"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      PRIVATE_STORAGE_ROOT: /app/storage/private
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA}
    volumes:
      - orontes_private_storage:/app/storage/private
    expose:
      - "3000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  mail-worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    command: ["npm", "run", "mail:process"]
    environment:
      APP_ENV: production
      APP_ORIGIN: ${APP_ORIGIN:?APP_ORIGIN is required}
      TRUST_PROXY: "true"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      PRIVATE_STORAGE_ROOT: /app/storage/private
      MAIL_WORKER_BATCH_SIZE: ${MAIL_WORKER_BATCH_SIZE:-25}
    volumes:
      - orontes_private_storage:/app/storage/private
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - orontes_postgres_data:/var/lib/postgresql/data
      - orontes_database_backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

networks:
  public:
  internal:
    internal: true

volumes:
  orontes_postgres_data:
  orontes_private_storage:
  orontes_database_backups:
